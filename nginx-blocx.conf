server {
    listen 80;
    server_name blocx.ro www.blocx.ro;
    return 301 https://blocx.ro$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.blocx.ro;

    ssl_certificate /etc/letsencrypt/live/blocx.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blocx.ro/privkey.pem;

    return 301 https://blocx.ro$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blocx.ro;

    ssl_certificate /etc/letsencrypt/live/blocx.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blocx.ro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Webhook endpoint - no timeout
    location /api/payments/webhook {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    client_max_body_size 10M;
}
